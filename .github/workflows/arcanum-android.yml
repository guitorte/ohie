name: Arcanum Android CI
on:
  push:
    branches: [ main ]
    paths: [ 'tarot-spread-builder/**' ]
  pull_request:
    paths: [ 'tarot-spread-builder/**' ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: tarot-spread-builder/android } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: arcanum-debug-apk
          path: tarot-spread-builder/android/app/build/outputs/apk/debug/app-debug.apk
