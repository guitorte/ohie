name: Android CI
on:
  push: { branches: [ main ] }
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: prompt-gallery } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew test assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: prompt-gallery-debug-apk
          path: prompt-gallery/app/build/outputs/apk/debug/app-debug.apk
          
