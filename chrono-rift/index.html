<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chrono Rift</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;touch-action:none}
    #c{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:none}
    #hud{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:none;gap:6px;align-items:flex-end}
    .dpad{display:grid;grid-template-columns:repeat(3,40px);grid-template-rows:repeat(3,40px);gap:2px}
    .tb{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);border-radius:6px;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent}
    .ab{display:flex;gap:6px;margin-bottom:0;padding-bottom:0;align-items:flex-end}
    @media(hover:none){#hud{display:flex}}
    #info{position:absolute;bottom:4px;right:8px;color:#444;font:10px monospace;display:none}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="dpad">
    <div></div><div class="tb" id="bu">▲</div><div></div>
    <div class="tb" id="bl">◄</div><div></div><div class="tb" id="br">►</div>
    <div></div><div class="tb" id="bd">▼</div><div></div>
  </div>
  <div class="ab" style="margin-left:16px">
    <div class="tb" id="bx" style="width:40px;height:40px;font-size:12px">B</div>
    <div class="tb" id="bz" style="width:40px;height:40px;font-size:12px">A</div>
    <div class="tb" id="bst" style="width:56px;height:32px;font-size:10px">START</div>
  </div>
</div>
<div id="info">CHRONO RIFT v1.0</div>
<script src="js/core.js"></script>
<script src="js/sprites.js"></script>
<script src="js/data.js"></script>
<script src="js/battle.js"></script>
<script src="js/scenes.js"></script>
<script src="js/main.js"></script>
</body>
</html>
