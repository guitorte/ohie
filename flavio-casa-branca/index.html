<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flávio na Casa Branca — A Aventura</title>
<style>
  :root{
    --tan:#caa86a; --tan-d:#7c5e34; --tan-l:#e6cf9a;
    --panel:#241d15; --panel2:#15100a; --bezel:#000;
    --ink:#f2e8d4; --muted:#b8a888; --green:#84d24a; --amber:#f0c04a; --red:#e06048;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; height:100%; background:#000; overflow:hidden;
    font-family:ui-monospace,"SFMono-Regular","Courier New",monospace;
    color:var(--ink); -webkit-user-select:none; user-select:none; touch-action:manipulation;
  }
  #app{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
        background:radial-gradient(120% 120% at 50% 30%,#1a1a22,#000); padding:env(safe-area-inset-top) 0 0; }
  #col{
    position:relative; width:100%; max-width:460px; height:100%; max-height:980px;
    display:flex; flex-direction:column; background:var(--panel2);
    border-left:2px solid #000; border-right:2px solid #000; overflow:hidden;
  }
  /* ---- cena pixel-art: preenche a largura em retrato; em paisagem a altura
         é limitada e a cena faz letterbox (object-fit) — nunca distorce ---- */
  #screen{ position:relative; width:100%; aspect-ratio:320/150; max-height:48vh;
           background:#05060a; flex:0 0 auto; border-bottom:3px solid #000; }
  #c{ display:block; width:100%; height:100%; object-fit:contain;
      image-rendering:pixelated; image-rendering:crisp-edges; }
  #tapname{ position:absolute; left:50%; top:6px; transform:translateX(-50%);
            font-size:13px; color:var(--amber); background:rgba(0,0,0,.55); padding:2px 8px;
            border-radius:2px; pointer-events:none; opacity:0; transition:opacity .12s; white-space:nowrap; }
  /* ---- HUD ---- */
  #hud{ flex:1 1 auto; display:flex; flex-direction:column; min-height:0; }
  #narration{
    flex:1 1 auto; overflow-y:auto; padding:12px 14px; line-height:1.5;
    font-size:clamp(15px,4.3vw,19px); color:var(--ink); background:var(--panel);
    border-bottom:2px solid #000; -webkit-overflow-scrolling:touch;
  }
  #narration b{ color:var(--amber); }
  #action{
    padding:7px 12px; font-size:clamp(13px,3.6vw,16px); color:var(--green);
    background:#0c0a06; border-bottom:1px solid #000; min-height:30px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }
  #action .pick{ color:var(--amber); }
  #verbs{ display:grid; grid-template-columns:repeat(3,1fr); gap:5px; padding:6px; }
  .verb{
    appearance:none; border:0; cursor:pointer; min-height:46px; padding:6px 4px;
    font:inherit; font-size:clamp(12px,3.5vw,15px); color:#2a1d0c; background:var(--tan);
    border-top:2px solid var(--tan-l); border-left:2px solid var(--tan-l);
    border-bottom:3px solid var(--tan-d); border-right:3px solid var(--tan-d);
    border-radius:3px; line-height:1.05;
  }
  .verb:active{ transform:translateY(1px); border-bottom-width:2px; }
  .verb.sel{ background:var(--amber); color:#1a1206;
             border-top-color:#fff0c0; border-left-color:#fff0c0; }
  #inv{ display:flex; gap:6px; padding:0 6px 8px; overflow-x:auto; min-height:54px; -webkit-overflow-scrolling:touch; }
  #inv:empty::after{ content:"(bolsos vazios)"; color:#5a4e3a; font-size:13px; align-self:center; padding:4px; }
  .item{
    flex:0 0 auto; display:flex; align-items:center; gap:6px; cursor:pointer;
    padding:6px 10px 6px 6px; background:#1d2638; color:var(--ink); font-size:13px;
    border-top:2px solid #38507a; border-left:2px solid #38507a;
    border-bottom:3px solid #0a1020; border-right:3px solid #0a1020; border-radius:3px; white-space:nowrap;
  }
  .item:active{ transform:translateY(1px); }
  .item.sel{ background:#5a4a1c; border-top-color:var(--amber); border-left-color:var(--amber); }
  .item canvas{ width:32px; height:24px; image-rendering:pixelated; }
  #endbar{ display:none; padding:10px; }
  #endbar button{ width:100%; min-height:52px; font:inherit; font-size:16px; cursor:pointer;
    color:#1a1206; background:var(--amber); border:0; border-bottom:4px solid #9c7414; border-radius:4px; }
  /* ---- overlays (telas de menu/história) ---- */
  #overlay{ position:absolute; inset:0; display:none; flex-direction:column;
            background:rgba(6,5,10,.86); padding:18px; overflow-y:auto; z-index:5; }
  #overlay.show{ display:flex; }
  #overlay .ov{ margin:auto 0; }
  #overlay h1{ font-size:clamp(30px,11vw,52px); letter-spacing:2px; margin:0; text-align:center;
               color:var(--amber); text-shadow:3px 3px 0 var(--red), 0 0 1px #000; }
  #overlay h2{ font-size:clamp(15px,4.6vw,20px); margin:4px 0 18px; text-align:center; color:var(--ink); }
  #overlay p{ font-size:clamp(14px,4.2vw,17px); line-height:1.55; margin:0 0 12px; color:var(--ink); }
  #overlay p.dim{ color:var(--muted); font-size:13px; }
  #overlay p b{ color:var(--amber); }
  #overlay .scene-mini{ text-align:center; font-size:40px; margin:6px 0 14px; }
  #overlay input{ width:100%; font:inherit; font-size:18px; padding:10px; margin:6px 0 14px;
                  background:#000; color:var(--green); border:2px solid var(--tan-d); border-radius:3px; }
  #overlay button.go{ display:block; width:100%; min-height:54px; font:inherit; font-size:18px; cursor:pointer;
    color:#1a1206; background:var(--green); border:0; border-bottom:4px solid #3c7a18; border-radius:4px; }
  #overlay .credit{ text-align:center; color:#6a5e44; font-size:12px; margin-top:16px; }
  #hint{ position:absolute; left:0; right:0; bottom:6px; text-align:center; font-size:11px; color:#4a4236; z-index:1; }
  /* paisagem baixa: encolhe a cena e os controles p/ sobrar texto */
  @media (orientation:landscape) and (max-height:560px){
    #screen{ max-height:40vh; }
    .verb{ min-height:38px; }
    #inv{ min-height:46px; }
    #narration{ font-size:clamp(14px,3.4vw,17px); }
  }
</style>
</head>
<body>
<div id="app"><div id="col">
  <div id="screen">
    <canvas id="c" width="320" height="150"></canvas>
    <div id="tapname"></div>
  </div>
  <div id="hud">
    <div id="narration"></div>
    <div id="action"></div>
    <div id="verbs"></div>
    <div id="inv"></div>
    <div id="endbar"><button id="replay">📸 Jogar de novo</button></div>
  </div>
  <div id="overlay"><div class="ov" id="ovc"></div></div>
  <div id="hint">o primeiro toque liga o som (PC Speaker)</div>
</div></div>
<script>
"use strict";
/* =========================================================================
   FLÁVIO NA CASA BRANCA — A AVENTURA
   Arquitetura: cena em pixel-art no <canvas> (320x150, escalado pixelado) +
   TODO texto/UI em DOM crisp e grande (legível no celular vertical).
   ========================================================================= */

/* ---------- canvas da cena ---------- */
const SCREEN_W=320, SCREEN_H=150;
const cv = document.getElementById('c');
let ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

const bgCanvas=document.createElement('canvas');
bgCanvas.width=SCREEN_W; bgCanvas.height=SCREEN_H;
const bgctx=bgCanvas.getContext('2d'); bgctx.imageSmoothingEnabled=false;
let bgBuilt=false;

/* ---------- paleta ---------- */
const P = {
  skyTop:'#36488f', skyMid:'#5878c8', skyLow:'#9fb6e2', skyHaze:'#e6d2b0',
  cloud:'#eef0f6', cloudSh:'#aeb8d8',
  whiteHi:'#fffdf0', white:'#f4f0e0', wwhite:'#ddd8c4', shadow:'#a6a8be', whiteSh:'#888aa8', cool:'#6e74a0',
  grassHi:'#52a83e', grass:'#2c7a2c', grassDk:'#1f5a1f', grassSh:'#143e18',
  path:'#cdb888', pathHi:'#e0cfa2', pathDk:'#9c8456', pathSh:'#766240',
  red:'#c83030', redDk:'#8a1d1d', blue:'#3048a8', blueLt:'#5a78d8', gold:'#e0b828', goldDk:'#9c7a14',
  skin:'#e0a878', skinHi:'#f2c898', skinDk:'#b07848', skinSh:'#8a5836', hair:'#503018', hairHi:'#6e4824',
  black:'#0e0e16', dkgray:'#2a2a3a', gray:'#707080', ltgray:'#b8b8c4', white2:'#f0f0f4',
  green2:'#46c83c', brown:'#7a5020', brownHi:'#9c6c2c', brownDk:'#4a2e0e',
  metal:'#9aa0b0', metalHi:'#c4c8d4', metalDk:'#585e72',
};
const BAYER=[0,8,2,10, 12,4,14,6, 3,11,1,9, 15,7,13,5];
function ditherGrad(g,x0,y0,w,h,cTop,cBot){
  g.fillStyle=cTop; g.fillRect(x0,y0,w,h); g.fillStyle=cBot;
  for(let y=0;y<h;y++){ const t=h>1?y/(h-1):0;
    for(let x=0;x<w;x++){ if(t>(BAYER[((y&3)<<2)|(x&3)]+0.5)/16) g.fillRect(x0+x,y0+y,1,1); } }
}

/* ---------- "PC Speaker" ---------- */
let audioCtx=null, soundOn=false;
function initAudio(){ if(audioCtx) return;
  try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); soundOn=true; }catch(e){ soundOn=false; }
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
}
function beep(f,d,t,v){ if(!soundOn) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=t||'square'; o.frequency.value=f; g.gain.value=v||0.05;
  o.connect(g); g.connect(audioCtx.destination);
  const n=audioCtx.currentTime; o.start(n); o.stop(n+(d||0.05));
  g.gain.setValueAtTime(g.gain.value,n); g.gain.linearRampToValueAtTime(0.0001,n+(d||0.05));
}
const blip=()=>beep(660,0.03,'square',0.04);
const clickSnd=()=>beep(220,0.04,'square',0.05);
function sadTrombone(){ [233,220,196,165].forEach((f,i)=>setTimeout(()=>beep(f,0.28,'sawtooth',0.06),i*230)); }
function triumph(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'square',0.06),i*150)); }
function camera(){ beep(1500,0.02,'square',0.07); setTimeout(()=>beep(120,0.12,'sawtooth',0.05),40); }

/* =========================================================================
   ESTADO / DADOS
   ========================================================================= */
const STATE={ TITLE:0, INTRO:1, COPY:2, GAME:3, WIN:4 };
let state=STATE.TITLE;

const game={
  inv:['celular'],
  flags:{ talkedGuard:false, gotBadge:false, gaveBadge:false, gotDog:false,
          squirrel:false, guardDistracted:false, won:false },
  flavioX:60, flavioTargetX:60, walking:false, facing:1, bob:0,
};
const ITEMS={
  celular:{ name:'Celular',  desc:'Meu celular. Tela rachada, mas a câmera funciona — é o que importa pra selfie histórica.' },
  cracha:{  name:'Crachá Vencido', desc:'Crachá plastificado que achei no lixo. Diz "VISITOR — STENOGRAPHER, FLAVIA" e venceu em 1998. Serve.' },
  cachorro:{name:'Cachorro-Quente', desc:'Cachorro-quente que o vendedor me deu de pena. Pouco molho. A vida é assim.' },
};
const VERBS=[
  {id:'olhar',label:'Olhar'}, {id:'pegar',label:'Pegar'}, {id:'usar',label:'Usar'},
  {id:'falar',label:'Falar'}, {id:'dar',label:'Dar'}, {id:'andar',label:'Ir p/'},
];
let curVerb='olhar', usingItem=null;

const HOTSPOTS=[
  {id:'guarda', name:'Segurança Brad', x:150,y:55,w:48,h:90, walkX:140},
  {id:'portao', name:'Portão da Casa Branca', x:196,y:40,w:60,h:105, walkX:182},
  {id:'cart',   name:'Carrinho de Cachorro-Quente', x:8,y:74,w:52,h:52, walkX:62},
  {id:'turista',name:'Turista', x:96,y:72,w:28,h:66, walkX:92},
  {id:'lixo',   name:'Lata de Lixo', x:62,y:92,w:22,h:34, walkX:80},
  {id:'arbusto',name:'Arbusto', x:258,y:100,w:50,h:38, walkX:250},
  {id:'casa',   name:'Casa Branca', x:120,y:4,w:170,h:40, walkX:140},
];

/* =========================================================================
   NARRAÇÃO / DOM
   ========================================================================= */
const elNarr=document.getElementById('narration');
const elAction=document.getElementById('action');
const elVerbs=document.getElementById('verbs');
const elInv=document.getElementById('inv');
const elEnd=document.getElementById('endbar');
const elTapName=document.getElementById('tapname');
const elOverlay=document.getElementById('overlay');
const elOvc=document.getElementById('ovc');

function say(html,color){ elNarr.innerHTML=html; elNarr.style.color=color||'var(--ink)'; elNarr.scrollTop=0; blip(); }

let tapNameTimer=0;
function flashName(n){ elTapName.textContent=n; elTapName.style.opacity='1'; tapNameTimer=90; }

function findItem(id){ return game.inv.indexOf(id)>=0; }
function addItem(id){ if(!findItem(id)){ game.inv.push(id); buildInventory(); } }
function removeItem(id){ const i=game.inv.indexOf(id); if(i>=0){ game.inv.splice(i,1); buildInventory(); } }
function walkTo(x){ game.flavioTargetX=Math.max(20,Math.min(262,x));
  game.facing=game.flavioTargetX<game.flavioX?-1:1; game.walking=true; }

function buildVerbs(){
  elVerbs.innerHTML='';
  for(const v of VERBS){
    const b=document.createElement('button');
    b.className='verb'+(curVerb===v.id?' sel':''); b.textContent=v.label;
    b.onclick=()=>{ initAudio(); curVerb=v.id; if(v.id!=='usar'&&v.id!=='dar') usingItem=null; clickSnd(); refreshVerbs(); updateAction(); };
    elVerbs.appendChild(b);
  }
}
function refreshVerbs(){ [...elVerbs.children].forEach((b,i)=> b.classList.toggle('sel',VERBS[i].id===curVerb)); }

function buildInventory(){
  elInv.innerHTML='';
  for(const id of game.inv){
    const d=document.createElement('div');
    d.className='item'+(usingItem===id?' sel':'');
    const ic=document.createElement('canvas'); ic.width=32; ic.height=24;
    drawItemIcon(ic.getContext('2d'), id);
    const sp=document.createElement('span'); sp.textContent=ITEMS[id].name;
    d.appendChild(ic); d.appendChild(sp);
    d.onclick=()=>{ initAudio(); clickInvItem(id); };
    elInv.appendChild(d);
  }
}
function refreshInv(){ [...elInv.children].forEach((d,i)=> d.classList.toggle('sel',usingItem===game.inv[i])); }

function updateAction(){
  let s=VERBS.find(v=>v.id===curVerb).label;
  if(usingItem && (curVerb==='usar'||curVerb==='dar')){
    s=(curVerb==='dar'?'Dar ':'Usar ')+'<span class="pick">'+ITEMS[usingItem].name+'</span>'+
      (curVerb==='dar'?' para… ':' com… ')+'(toque no alvo)';
  } else if(curVerb==='usar'||curVerb==='dar'){
    s+=' … (escolha um item, depois o alvo)';
  } else {
    s+=' …';
  }
  elAction.innerHTML=s;
}

function clickInvItem(id){
  if(curVerb==='usar'||curVerb==='dar'){
    usingItem=(usingItem===id?null:id); clickSnd();
  } else {
    usingItem=null; say(ITEMS[id].desc,'var(--muted)'); // só inspeciona
  }
  refreshInv(); updateAction();
}

/* =========================================================================
   LÓGICA DAS INTERAÇÕES (humor constrangedor)
   ========================================================================= */
function interact(hotId){
  const hs=HOTSPOTS.find(h=>h.id===hotId); const f=game.flags;

  if(usingItem){
    const it=usingItem, action=curVerb; usingItem=null; curVerb='olhar';
    refreshVerbs(); refreshInv(); updateAction();

    if(it==='cracha' && hotId==='guarda' && !f.gotDog && !f.squirrel){
      f.gaveBadge=true;
      say('Brad pega o crachá, lê devagar e devolve: <b>"Senhor, isso é um crachá de ESTENÓGRAFA, venceu em 1998, e está escrito FLAVIA. ...O senhor é a Flavia?"</b> Eu: "Sou primo dela." Ele só me encara.');
      sadTrombone(); return;
    }
    if(it==='cachorro' && hotId==='guarda'){
      say('Ofereço o cachorro-quente pro Brad. <b>"Comi às 6h, senhor. E sou vegano."</b> Ele olha pra salsicha encharcada de molho na minha mão. Eu continuo segurando. Ninguém fala nada por uns 8 segundos.');
      sadTrombone(); return;
    }
    if(it==='cachorro' && hotId==='turista'){
      say('A turista recusa: "No, thank you." Eu insisto em inglês: <b>"Is free, is free, very gostoso."</b> Ela atravessa a rua.');
      sadTrombone(); return;
    }
    if(it==='cachorro' && hotId==='arbusto'){
      if(!f.squirrel){ removeItem('cachorro'); f.squirrel=true;
        say('Coloco o cachorro-quente no arbusto feito isca. Um <b>esquilo</b> gordo da Casa Branca aparece na hora e começa a roer. Ele me olha. Eu olho pra ele. Temos um plano agora. (Eu tenho um plano.)','var(--green)');
        beep(880,0.05,'square',0.05);
      } else say('O esquilo já está lá detonando o lanche. Não vou atrapalhar o artista.');
      return;
    }
    if(it==='cracha' && hotId==='arbusto'){
      if(f.squirrel && !f.guardDistracted){ removeItem('cracha'); f.guardDistracted=true;
        say('Prendo o crachá "VISITOR" no esquilo com a presilha. Agora ele é um visitante <b>CREDENCIADO</b>. O esquilo dispara pro portão. Brad grita "INTRUDER WITH BADGE!" e sai correndo atrás dele. <b>O posto ficou VAZIO.</b>','var(--amber)');
        triumph();
      } else if(!f.squirrel){ say('Não tem esquilo nenhum aqui. Eu ia prender o crachá em quê, no arbusto? Que vergonha pensar nisso.'); }
      return;
    }
    if(it==='celular' && (hotId==='portao'||hotId==='casa'||hotId==='guarda')){
      if(f.guardDistracted){ winSequence(); return; }
      say('Levanto o celular pra selfie, mas o Brad ainda está aqui plantado feito poste. Ele tampa a câmera com a mão. <b>"No photos, sir."</b> Preciso tirar ele daqui.');
      return;
    }
    say('Tento usar '+ITEMS[it].name.toLowerCase()+' com '+(hs?hs.name.toLowerCase():'isso')+'. Não acontece nada. Algumas pessoas filmam com o celular. Pra postar.');
    return;
  }

  switch(hotId){
    case 'casa':
      if(curVerb==='olhar') say('A Casa Branca. Branca, grande, cheia de colunas. Eu <b>deveria</b> estar lá dentro, do lado do presidente, comendo uns salgadinhos importados. Em vez disso, suo na gravata do meu pai aqui na calçada.');
      else if(curVerb==='andar') say('Tem um portão, um guarda de 1,90m e o bom senso entre mim e a Casa Branca. Detalhes.');
      else say('Não dá pra fazer isso com um prédio histórico, Flávio. Controle-se.');
      break;
    case 'portao':
      if(curVerb==='olhar') say('Portão de ferro preto com águia dourada. Trancado. Atrás dele, o gramado mais bem cuidado do hemisfério norte.');
      else if(curVerb==='pegar') say('Sacudo o portão. Faz barulho. O guarda tosse. Eu paro e disfarço assobiando o hino do Brasil errado.');
      else if(curVerb==='usar'){ if(game.flags.guardDistracted) say('Com o Brad longe, dá pra tentar a selfie agora. <b>Use o Celular no portão.</b>','var(--amber)');
        else say('O portão não abre, e o Brad não tira o olho de mim. Tenho que dar um jeito nesse guarda primeiro.'); }
      else if(curVerb==='andar'){ walkTo(182); say('Chego perto do portão. Cheiro de poder e grama recém-cortada.'); }
      else say('O portão não está interessado em conversa, Flávio.');
      break;
    case 'guarda':
      if(curVerb==='olhar') say('Brad. Segurança. Óculos escuros mesmo nublado, fone na orelha e zero dúvida sobre quem eu <b>não</b> sou.');
      else if(curVerb==='falar'){ game.flags.talkedGuard=true;
        if(game.flags.guardDistracted) say('O Brad sumiu atrás de um esquilo credenciado. Não tem com quem falar. <b>APROVEITA.</b>','var(--amber)');
        else say('Eu: "Bom dia! Flávio, convidado da reunião presidencial." Brad confere a prancheta. "...Não tem nenhum Flávio aqui." Eu: "Procura por Flávio com PH." Ele: "...Não." Eu: <b>"Tenta de novo, com carinho."</b> Uns turistas pararam pra assistir.'); }
      else if(curVerb==='dar') say('Pra dar algo pro Brad, escolha o item no inventário primeiro.','var(--muted)');
      else if(curVerb==='pegar') say('Não vou <b>pegar</b> no segurança da Casa Branca. Já estou numa situação delicada o suficiente.');
      else if(curVerb==='andar') walkTo(140);
      else say('O Brad não reage. Profissional.');
      break;
    case 'cart':
      if(curVerb==='olhar') say('Carrinho de cachorro-quente. O vendedor, Sérgio (crachá: "SERGIO"), brasileiro também, me reconheceu pela cara de perdido.');
      else if(curVerb==='falar'||curVerb==='pegar'){ if(!game.flags.gotDog){ game.flags.gotDog=true; addItem('cachorro');
          say('Sérgio: "Conterrâneo, qual foi?" Conto tudo. Ele faz que sim com pena, me dá um <b>cachorro-quente DE GRAÇA</b> e diz: "Vai por mim, volta pro hotel." Pego o lanche. (A dignidade não.)','var(--green)'); }
        else say('Sérgio: "Já te dei um, parceiro. Agora é por minha conta NÃO te dar mais." Ele tem razão.'); }
      else if(curVerb==='usar') say('Mexer no carrinho dele sem permissão? Não. Já estou representando mal o Brasil o bastante hoje.');
      else if(curVerb==='andar') walkTo(62);
      else say('...');
      break;
    case 'turista':
      if(curVerb==='olhar') say('Uma turista com boné "I ♥ DC" e uma câmera caríssima. Ela me filma achando que sou alguma "local attraction".');
      else if(curVerb==='falar') say('Eu: "Quer foto comigo? Sou quase convidado oficial." Ela sorri educada e fotografa o prédio <b>atrás</b> de mim. Eu saio na foto sem querer, de costas.');
      else if(curVerb==='pegar') say('Roubar a câmera dela? Vim tirar UMA selfie, não pegar 15 anos de prisão federal.');
      else if(curVerb==='andar') walkTo(92);
      else say('Ela finge que não entende português. Justo.');
      break;
    case 'lixo':
      if(curVerb==='olhar') say('Lata de lixo oficial. Algo plastificado brilha lá dentro. Pode ser útil. Pode ser nojento. Geralmente é os dois.');
      else if(curVerb==='pegar'){ if(!game.flags.gotBadge){ game.flags.gotBadge=true; addItem('cracha');
          say('Enfio a mão na lata (a turista filma tudo) e puxo um <b>CRACHÁ "VISITOR"</b> plastificado, meio grudento. Diz "STENOGRAPHER — FLAVIA". Praticamente meu. Guardo no bolso da gravata.','var(--green)'); }
        else say('Já peguei o crachá. Não vou catar mais coisa no lixo na frente de turista. Tem limite. (Pouco, mas tem.)'); }
      else if(curVerb==='usar') say('Fico encarando a lata de lixo. A lata de lixo me encara de volta. Empate.');
      else if(curVerb==='andar') walkTo(80);
      else say('É uma lata de lixo, Flávio.');
      break;
    case 'arbusto':
      if(curVerb==='olhar'){ if(game.flags.squirrel) say('Um esquilo gordo destruindo meu cachorro-quente. Ele tem mais credencial pra entrar ali do que eu.');
        else say('Arbusto ornamental impecável. Farfalha — deve ter bicho. Tudo aqui tem mais propósito do que eu neste momento.'); }
      else if(curVerb==='pegar') say('Cutuco o arbusto. Algo cutuca de volta. Recuo devagar, mantendo a dignidade.');
      else if(curVerb==='usar') say('Pra usar algo no arbusto, escolha um item primeiro.','var(--muted)');
      else if(curVerb==='andar') walkTo(250);
      else say('O arbusto não responde. Como todo mundo aqui.');
      break;
  }
}

  if(winStep>=2){ ctx.fillStyle=P.black; ctx.fillRect(120,118,40,10); ctx.fillStyle=P.dkgray; ctx.fillRect(120,118,40,1); ctx.fillStyle=P.skinDk; ctx.fillRect(150,120,8,4); }
}
function endWin(){ game.flags.won=true; say(winEndText,'var(--amber)'); elEnd.style.display='block'; }

/* =========================================================================
   OVERLAYS (telas) — DOM legível
   ========================================================================= */
function showOverlay(html){ elOvc.innerHTML=html; elOverlay.classList.add('show'); }
function hideOverlay(){ elOverlay.classList.remove('show'); }

function screenTitle(){
  state=STATE.TITLE;
  showOverlay(
    '<div class="ov">'+
    '<h1>FLÁVIO</h1><h2>na CASA BRANCA &middot; A Aventura</h2>'+
    '<div class="scene-mini">🏛️🤳</div>'+
    '<button class="go" id="ov-go">▶ Começar</button>'+
    '<p class="credit">(c) 1994 TorteSoft — Disco 1 de 1.<br>Um point-and-click ruim de propósito.</p>'+
    '</div>');
  document.getElementById('ov-go').onclick=()=>{ initAudio(); clickSnd(); screenIntro(); };
}
function screenIntro(){
  state=STATE.INTRO;
  showOverlay(
    '<div class="ov">'+
    '<p><b>Washington, D.C. Manhã de quinta.</b></p>'+
    '<p>Você é <b>Flávio</b>. Semana passada, na padaria, você disse a todo mundo que foi convidado pra uma reunião com o <b>presidente dos EUA</b>.</p>'+
    '<p>Você não foi convidado.</p>'+
    '<p>Mas já comprou a passagem, alugou o terno do seu pai e avisou o grupo da família. Voltar sem uma <b>selfie</b> com o presidente seria… vergonha demais.</p>'+
    '<p><b>OBJETIVO:</b> entrar na Casa Branca e tirar a foto. Custe a dignidade que custar.</p>'+
    '<button class="go" id="ov-go">Continuar</button></div>');
  document.getElementById('ov-go').onclick=()=>{ clickSnd(); screenCopy(); };
}
function screenCopy(){
  state=STATE.COPY;
  showOverlay(
    '<div class="ov">'+
    '<h2 style="color:var(--amber)">PROTEÇÃO ANTI-PIRATARIA</h2>'+
    '<p>Consulte o <b>MANUAL</b> incluso na caixa.</p>'+
    '<p>Qual a 3ª palavra da página 14, parágrafo 2, do manual do Flávio?</p>'+
    '<input id="ov-in" placeholder="digite aqui…" autocomplete="off">'+
    '<p class="dim">(Você não tem o manual. Ninguém tem. Apague o que digitou e toque em Continuar.)</p>'+
    '<button class="go" id="ov-go">Continuar</button></div>');
  document.getElementById('ov-go').onclick=()=>{ clickSnd(); startGame(); };
}
function startGame(){
  hideOverlay(); state=STATE.GAME;
  elVerbs.style.display=''; elInv.style.display=''; elAction.style.display=''; elEnd.style.display='none';
  buildVerbs(); buildInventory(); updateAction();
  say('Cheguei. A Casa Branca. Respira, Flávio. Aja natural.<br><br><b>Como jogar:</b> toque num <b>verbo</b>, depois toque numa coisa da cena. Para usar/dar um item, toque nele (no inventário) e depois no alvo.','var(--green)');
}

function resetGame(){
  game.inv=['celular']; for(const k in game.flags) game.flags[k]=false;
  game.flavioX=60; game.flavioTargetX=60; game.walking=false; curVerb='olhar'; usingItem=null;
  winStep=0; winTimer=0;
}
document.getElementById('replay').onclick=()=>{ clickSnd(); resetGame(); screenTitle(); };

/* =========================================================================
   INPUT (toque na cena)
   ========================================================================= */
function pointInHot(x,y,h){ return x>=h.x&&x<=h.x+h.w&&y>=h.y&&y<=h.y+h.h; }
function sceneCoords(ev){ const r=cv.getBoundingClientRect(); const t=ev.changedTouches?ev.changedTouches[0]:ev;
  return { x:(t.clientX-r.left)/r.width*SCREEN_W, y:(t.clientY-r.top)/r.height*SCREEN_H }; }

function onSceneTap(ev){ initAudio();
  const {x,y}=sceneCoords(ev);
  if(state===STATE.WIN){
    if(winStep<3){ winStep=Math.min(3,winStep+1); winTimer=0; if(winStep===3){ triumph(); endWin(); } else say(winTexts[winStep]); }
    return;
  }
  if(state!==STATE.GAME) return;
  for(const h of HOTSPOTS){ if(pointInHot(x,y,h)){ flashName(h.name);
    if(h.walkX!=null && curVerb!=='andar') walkTo(h.walkX);
    interact(h.id); refreshVerbs(); refreshInv(); updateAction(); return; } }
  if(y>70) walkTo(x);
  else if(usingItem){ usingItem=null; curVerb='olhar'; refreshVerbs(); refreshInv(); updateAction(); }
}
cv.addEventListener('click', onSceneTap);
cv.addEventListener('touchend', e=>{ e.preventDefault(); onSceneTap(e); }, {passive:false});
document.addEventListener('pointerdown', initAudio, {once:false});
window.addEventListener('keydown', e=>{ if(state===STATE.COPY && (e.key==='Enter'||e.key==='Escape')){ startGame(); } });
document.getElementById('hint') && (()=>{ const h=document.getElementById('hint');
  document.addEventListener('pointerdown',()=>{ h.style.display='none'; },{once:true}); })();

/* =========================================================================
   LOOP (só anima/desenha a cena; UI é DOM)
   ========================================================================= */
function loop(){
  if(game.walking){ game.bob+=0.4; const dx=game.flavioTargetX-game.flavioX;
    if(Math.abs(dx)<2){ game.flavioX=game.flavioTargetX; game.walking=false; } else game.flavioX+=Math.sign(dx)*1.6; }
  if(state===STATE.WIN){ winTimer++;
    if(winStep===0&&winTimer>70){ winStep=1; winTimer=0; camera(); say(winTexts[1]); }
    else if(winStep===1&&winTimer>90){ winStep=2; winTimer=0; say(winTexts[2]); }
    else if(winStep===2&&winTimer>110){ winStep=3; winTimer=0; triumph(); endWin(); }
  }
  if(tapNameTimer>0 && --tapNameTimer===0) elTapName.style.opacity='0';

  if(state===STATE.WIN) drawWinScene();
  else {
    drawBackdrop(); drawCart(12,86); drawTrash(64,98); drawBush(262,104); drawTourist(100,74);
    if(game.flags.squirrel) drawSquirrel(272,116);
    drawFlavio(Math.round(game.flavioX),108,{}); drawGuard(158,60);
  }
  requestAnimationFrame(loop);
}

screenTitle();
loop();
</script>
