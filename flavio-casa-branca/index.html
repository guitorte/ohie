<script>
"use strict";
/* =========================================================================
   FLÁVIO NA CASA BRANCA — A AVENTURA  (c) 1994 TorteSoft (não)
   Um autêntico point-and-click ruim de propósito.
   Tudo desenhado à mão em 320x200. Sem assets externos. Sem vergonha.
   ========================================================================= */

const SCREEN_W = 320;
let   SCREEN_H = 200;            // cresce em retrato (UI maior p/ toque)
const SCENE_H  = 150;           // a cena ocupa sempre 0..150; UI vem depois
let   portrait = false;
let   dlgScale = 1;             // tamanho da fonte dos diálogos (maior no celular)
const view = document.getElementById('c');
const vctx = view.getContext('2d');
vctx.imageSmoothingEnabled = false;

// Offscreen — desenhamos aqui e escalamos com nearest-neighbor.
const buf = document.createElement('canvas');
buf.width = SCREEN_W; buf.height = SCREEN_H;
let ctx = buf.getContext('2d');
ctx.imageSmoothingEnabled = false;
ctx.textBaseline = 'top';

// Cache do fundo estático (céu+casa+gramado+cerca): caro de redesenhar
// (gradiente com dithering) então renderizamos uma vez.
const bgCanvas = document.createElement('canvas');
bgCanvas.width = SCREEN_W; bgCanvas.height = SCENE_H;
const bgctx = bgCanvas.getContext('2d');
bgctx.imageSmoothingEnabled = false; bgctx.textBaseline = 'top';
let bgBuilt = false;

/* ---- Paleta VGA "pintada" estilo Full Throttle: tons quentes,
        sombras frias, luz direcional ---- */
const P = {
  // céu (do topo escuro ao horizonte com névoa quente)
  skyTop:'#36488f', skyMid:'#5878c8', skyLow:'#9fb6e2', skyHaze:'#e6d2b0',
  cloud:'#eef0f6', cloudSh:'#aeb8d8',
  // branco da Casa (face ao sol quente / sombra fria)
  whiteHi:'#fffdf0', white:'#f4f0e0', wwhite:'#ddd8c4', shadow:'#a6a8be', whiteSh:'#888aa8',
  cool:'#6e74a0',
  // gramado
  grassHi:'#52a83e', grass:'#2c7a2c', grassDk:'#1f5a1f', grassSh:'#143e18',
  // calçada
  path:'#cdb888', pathHi:'#e0cfa2', pathDk:'#9c8456', pathSh:'#766240',
  // cores gerais
  red:'#c83030', redDk:'#8a1d1d', blue:'#3048a8', blueLt:'#5a78d8', gold:'#e0b828', goldDk:'#9c7a14',
  skin:'#e0a878', skinHi:'#f2c898', skinDk:'#b07848', skinSh:'#8a5836', hair:'#503018', hairHi:'#6e4824',
  black:'#0e0e16', dkgray:'#2a2a3a', gray:'#707080', ltgray:'#b8b8c4', white2:'#f0f0f4',
  uiBg:'#322a26', uiBg2:'#241e1b', uiHi:'#5a4a3e', uiLine:'#7a6450', uiSel:'#a8783c',
  green2:'#46c83c', brown:'#7a5020', brownHi:'#9c6c2c', brownDk:'#4a2e0e',
  metal:'#9aa0b0', metalHi:'#c4c8d4', metalDk:'#585e72',
};

/* Bayer 4x4 p/ gradientes com dithering ordenado (look "pintado" de VGA). */
const BAYER = [0,8,2,10, 12,4,14,6, 3,11,1,9, 15,7,13,5];
function ditherGrad(g, x0,y0,w,h, cTop,cBot){
  g.fillStyle = cTop; g.fillRect(x0,y0,w,h);
  g.fillStyle = cBot;
  for(let y=0;y<h;y++){
    const t = h>1 ? y/(h-1) : 0;
    for(let x=0;x<w;x++){
      const thr = (BAYER[((y&3)<<2)|(x&3)] + 0.5)/16;
      if(t > thr) g.fillRect(x0+x, y0+y, 1, 1);
    }
  }
}

/* ---- "PC Speaker" beeps via WebAudio ---- */
let audioCtx = null, soundOn = false;
function initAudio(){
  if(audioCtx) return;
  try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); soundOn = true; }
  catch(e){ soundOn = false; }
}
function beep(freq, dur, type, vol){
  if(!soundOn||!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type||'square'; o.frequency.value = freq;
  g.gain.value = vol||0.05;
  o.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  o.start(t); o.stop(t + (dur||0.05));
  g.gain.setValueAtTime(g.gain.value, t);
  g.gain.linearRampToValueAtTime(0.0001, t + (dur||0.05));
}
function blip(){ beep(660,0.03,'square',0.04); }
function clickSnd(){ beep(220,0.04,'square',0.05); }
function sadTrombone(){
  if(!soundOn) return;
  const ns=[233,220,196,165];
  ns.forEach((f,i)=>setTimeout(()=>beep(f,0.28,'sawtooth',0.06),i*230));
}
function triumph(){
  if(!soundOn) return;
  const ns=[523,659,784,1046];
  ns.forEach((f,i)=>setTimeout(()=>beep(f,0.18,'square',0.06),i*150));
}
function camera(){ beep(1500,0.02,'square',0.07); setTimeout(()=>beep(120,0.12,'sawtooth',0.05),40); }

/* =========================================================================
   FONTE: usamos a fonte do canvas em tamanho pequeno; ao escalar 3x com
   nearest-neighbor ela fica bem chunky e oitentista/noventista.
   ========================================================================= */
function txt(s, x, y, color, scale){
  scale = scale||1;
  ctx.fillStyle = color || P.white;
  ctx.font = (6*scale)+'px "Courier New",monospace';
  ctx.fillText(s, Math.round(x), Math.round(y));
}
function txtW(s, scale){
  scale = scale||1;
  ctx.font = (6*scale)+'px "Courier New",monospace';
  return ctx.measureText(s).width;
}
function txtCenter(s, y, color, scale){
  txt(s, (SCREEN_W - txtW(s,scale))/2, y, color, scale);
}
// texto com sombra/contorno — bem mais legível em tela de celular
function txtSh(s, x, y, color, scale){
  txt(s, x+1, y+1, P.black, scale);
  txt(s, x,   y,   color,   scale);
}
function txtCenterSh(s, y, color, scale){
  txtSh(s, (SCREEN_W - txtW(s,scale))/2, y, color, scale);
}
function wrap(s, maxW, scale){
  scale=scale||1;
  const words = s.split(' ');
  const lines=[]; let cur='';
  for(const w of words){
    const t = cur ? cur+' '+w : w;
    if(txtW(t,scale) > maxW && cur){ lines.push(cur); cur=w; }
    else cur=t;
  }
  if(cur) lines.push(cur);
  return lines;
}

/* =========================================================================
   ESTADO DO JOGO
   ========================================================================= */
const STATE = { BOOT:0, TITLE:1, COPYPROT:2, INTRO:3, GAME:4, WIN:5 };
let state = STATE.BOOT;
let bootTimer = 0;

const game = {
  inv: ['celular'],            // Flávio já chega com o celular (claro)
  flags: {
    talkedGuard:false, gotBadge:false, gaveBadge:false, gotDog:false,
    squirrel:false, guardDistracted:false, won:false,
  },
  flavioX: 60, flavioTargetX: 60, walking:false, facing:1, bob:0,
};

// Itens: ícone desenhado + nome
const ITEMS = {
  celular:  { name:'Celular',          desc:'Meu celular. Tela rachada, mas a câmera funciona. É o que importa pra selfie histórica.' },
  cracha:   { name:'Crachá Vencido',   desc:'Um crachá plastificado que achei no lixo. Diz "VISITOR - STENOGRAPHER" e venceu em 1998. Serve.' },
  cachorro: { name:'Cachorro-Quente',  desc:'Cachorro-quente que o vendedor me deu de pena. Tem pouco molho. A vida é assim.' },
};

/* ---- Verbos estilo SCUMM ---- */
const VERBS = [
  {id:'olhar', label:'Olhar'},
  {id:'pegar', label:'Pegar'},
  {id:'usar',  label:'Usar'},
  {id:'falar', label:'Falar com'},
  {id:'dar',   label:'Dar'},
  {id:'andar', label:'Ir para'},
];
let curVerb = 'olhar';
let usingItem = null;     // item selecionado para "Usar X com Y" / "Dar X para Y"

/* ---- Hotspots da cena (coordenadas no mundo 320x150) ---- */
const HOTSPOTS = [
  {id:'guarda',  name:'Segurança Brad', x:158, y:60,  w:34, h:80, walkX:140},
  {id:'portao',  name:'Portão da Casa Branca', x:196, y:40, w:60, h:100, walkX:182},
  {id:'cart',    name:'Carrinho de Cachorro-Quente', x:10, y:78, w:46, h:46, walkX:62},
  {id:'turista', name:'Turista', x:100, y:74, w:20, h:62, walkX:92},
  {id:'lixo',    name:'Lata de Lixo', x:64, y:96, w:18, h:28, walkX:80},
  {id:'arbusto', name:'Arbusto', x:262, y:104, w:42, h:30, walkX:250},
  {id:'casa',    name:'Casa Branca', x:120, y:8,  w:170, h:36, walkX:140},
];

/* ---- Falas (subtítulo no topo). Guardamos o texto cru e quebramos as
        linhas na hora de desenhar, p/ refluir conforme o tamanho da fonte. */
let speech = null;        // {text, color}
function say(s, color){
  speech = { text: s, color: color||P.white };
  blip();
}
function clearSpeech(){ speech = null; }

/* =========================================================================
   LÓGICA DAS INTERAÇÕES  — o coração do humor constrangedor
   ========================================================================= */
function findItem(id){ return game.inv.indexOf(id) >= 0; }
function addItem(id){ if(!findItem(id)){ game.inv.push(id); blip(); } }
function removeItem(id){ const i=game.inv.indexOf(id); if(i>=0) game.inv.splice(i,1); }

function interact(hotId){
  const hs = HOTSPOTS.find(h=>h.id===hotId);
  const f = game.flags;

  // ---- USAR / DAR um item do inventário em um hotspot ----
  if(usingItem){
    const it = usingItem;
    const action = curVerb; // 'usar' ou 'dar'
    usingItem = null; curVerb = 'olhar';

    // DAR crachá / cachorro pro guarda
    if((it==='cracha') && hotId==='guarda'){
      if(!f.gotDog && !f.squirrel){
        f.gaveBadge = true;
        say('Brad pega o crachá, lê devagar e devolve: "Senhor, isso é um crachá de ESTENÓGRAFA, venceu em 1998, e tá escrito FLÁVIA. ...O senhor é a Flávia?" Eu: "Sou primo dela." Ele só me encara.', P.white);
        sadTrombone();
        return;
      }
    }
    if(it==='cachorro' && hotId==='guarda'){
      say('Eu ofereço o cachorro-quente pro Brad. "Comi às 6h, senhor. E sou vegano." Ele olha pro salsicha encharcada de molho na minha mão. Eu continuo segurando. Ninguém fala nada por uns 8 segundos.', P.white);
      sadTrombone();
      return;
    }
    if(it==='cachorro' && hotId==='turista'){
      say('A turista recusa: "No, thank you." Eu insisto em inglês: "Is free, is free, very gostoso." Ela atravessa a rua.', P.white);
      sadTrombone();
      return;
    }

    // PUZZLE: usar cachorro-quente no arbusto -> atrai esquilo
    if(it==='cachorro' && hotId==='arbusto'){
      if(!f.squirrel){
        removeItem('cachorro');
        f.squirrel = true;
        say('Coloco o cachorro-quente no arbusto feito isca. Um esquilo gordo da Casa Branca aparece na hora e começa a roer. Ele me olha. Eu olho pra ele. Temos um plano agora. (Eu tenho um plano.)', P.green2);
        beep(880,0.05,'square',0.05);
        return;
      } else {
        say('O esquilo já tá lá detonando o lanche. Não vou atrapalhar o artista.', P.white);
        return;
      }
    }

    // PUZZLE: usar crachá no esquilo (prende no esquilo -> "intruso identificado")
    if(it==='cracha' && hotId==='arbusto'){
      if(f.squirrel && !f.guardDistracted){
        removeItem('cracha');
        f.guardDistracted = true;
        say('Prendo o crachá "VISITOR" no esquilo com a presilha. Agora ele é um visitante CREDENCIADO. O esquilo dispara em direção ao portão. Brad grita "INTRUDER WITH BADGE!" e sai correndo atrás dele. O posto ficou VAZIO.', P.gold);
        triumph();
        return;
      } else if(!f.squirrel){
        say('Não tem esquilo nenhum aqui. Eu ia prender o crachá em quê? No arbusto? Que vergonha pensar nisso.', P.white);
        return;
      }
    }

    // Usar celular no portão / na casa quando o guarda saiu = VITÓRIA
    if(it==='celular' && (hotId==='portao'||hotId==='casa'||hotId==='guarda')){
      if(f.guardDistracted){ winSequence(); return; }
      say('Levanto o celular pra tirar a selfie, mas o Brad ainda tá aqui plantado feito poste. Ele tampa a câmera com a mão. "No photos, sir." Preciso tirar ele daqui.', P.white);
      return;
    }

    // fallback genérico
    const itName = ITEMS[it].name;
    say('Tento usar '+itName.toLowerCase()+' com '+(hs?hs.name.toLowerCase():'isso')+'. Não acontece nada. Algumas pessoas filmam com o celular. Pra postar.', P.white);
    return;
  }

  // ---- Verbos simples sobre hotspots ----
  switch(hotId){
    case 'casa':
      if(curVerb==='olhar') say('A Casa Branca. Branca, grande, cheia de colunas. Eu deveria estar LÁ DENTRO, sentado do lado do presidente, comendo uns salgadinhos importados. Em vez disso tô aqui na calçada suando na gravata do meu pai.', P.white);
      else if(curVerb==='andar') say('Tem um portão, um guarda de 1,90m e o bom senso entre mim e a Casa Branca. Detalhes.', P.white);
      else say('Não dá pra fazer isso com um prédio histórico, Flávio. Controle-se.', P.white);
      break;

    case 'portao':
      if(curVerb==='olhar') say('Portão de ferro preto com águia dourada. Trancado. Atrás dele, o gramado mais bem cuidado do hemisfério norte.', P.white);
      else if(curVerb==='pegar') say('Eu sacudo o portão. Faz barulho. O guarda tosse. Eu paro. Disfarço assobiando o hino do Brasil errado.', P.white);
      else if(curVerb==='usar'){
        if(game.flags.guardDistracted){ say('Com o Brad longe, eu poderia tentar a selfie agora. (Dica: USE o CELULAR no portão.)', P.gold); }
        else say('O portão não abre. E o Brad não tira o olho de mim. Tenho que dar um jeito nesse guarda primeiro.', P.white);
      }
      else if(curVerb==='andar'){ walkTo(182); say('Chego perto do portão. O cheiro de poder e grama recém-cortada.', P.white); }
      else say('O portão não tá interessado em conversa, Flávio.', P.white);
      break;

    case 'guarda':
      if(curVerb==='olhar') say('Brad. Segurança. Óculos escuros mesmo nublado. Tem um fone na orelha e zero dúvidas sobre quem eu NÃO sou.', P.white);
      else if(curVerb==='falar'){
        game.flags.talkedGuard = true;
        if(game.flags.guardDistracted){
          say('O Brad sumiu atrás de um esquilo credenciado. Não tem com quem falar. APROVEITA.', P.gold);
        } else {
          say('Eu: "Bom dia! Flávio, sou convidado da reunião presidencial." Brad confere a prancheta. "...Não tem nenhum Flávio aqui." Eu: "Procura por Flávio com PH." Ele: "...Não." Eu: "Tenta de novo, com carinho." Uns turistas pararam pra assistir.', P.white);
        }
      }
      else if(curVerb==='dar'){ say('Pra dar algo pro Brad eu preciso escolher o item no inventário primeiro. (Clique no item, depois nele.)', P.ltgray); }
      else if(curVerb==='pegar') say('Eu não vou PEGAR no segurança da Casa Branca. Já tô numa situação delicada o suficiente.', P.white);
      else if(curVerb==='andar'){ walkTo(140); }
      else say('O Brad não reage. Profissional.', P.white);
      break;

    case 'cart':
      if(curVerb==='olhar') say('Carrinho de cachorro-quente. O vendedor, Sérgio (crachá: "SERGIO"), brasileiro também, me reconheceu pela cara de perdido.', P.white);
      else if(curVerb==='falar'||curVerb==='pegar'){
        if(!game.flags.gotDog){
          game.flags.gotDog = true;
          addItem('cachorro');
          say('Sérgio: "Conterrâneo, qual foi?" Eu conto tudo. Ele faz que sim com pena, me dá um cachorro-quente DE GRAÇA e diz: "Vai por mim, volta pro hotel." Eu pego o lanche. (Pego a dignidade não.)', P.green2);
        } else {
          say('Sérgio: "Já te dei um, parceiro. Agora é por minha conta NÃO te dar mais." Ele tem razão.', P.white);
        }
      }
      else if(curVerb==='usar') say('Mexer no carrinho dele sem permissão? Não. Já tô representando mal o Brasil o bastante hoje.', P.white);
      else if(curVerb==='andar'){ walkTo(62); }
      else say('...', P.white);
      break;

    case 'turista':
      if(curVerb==='olhar') say('Uma turista com boné "I ♥ DC" e uma câmera caríssima pendurada. Ela me filma achando que sou alguma "local attraction".', P.white);
      else if(curVerb==='falar') say('Eu: "Você quer foto comigo? Sou quase convidado oficial." Ela sorri educada e tira foto do prédio ATRÁS de mim. Eu saio na foto sem querer, de costas.', P.white);
      else if(curVerb==='pegar') say('Roubar a câmera dela? Eu vim tirar UMA selfie, não pegar 15 anos de prisão federal.', P.white);
      else if(curVerb==='andar'){ walkTo(92); }
      else say('Ela finge que não entende português. Justo.', P.white);
      break;

    case 'lixo':
      if(curVerb==='olhar') say('Uma lata de lixo oficial. Brilhando algo plastificado lá dentro. Pode ser útil. Pode ser nojento. Geralmente é os dois.', P.white);
      else if(curVerb==='pegar'){
        if(!game.flags.gotBadge){
          game.flags.gotBadge = true;
          addItem('cracha');
          say('Enfio a mão na lata (a turista filma tudo) e puxo um CRACHÁ "VISITOR" plastificado. Tá meio grudento. Diz "STENOGRAPHER - FLAVIA". Praticamente meu. Guardo no bolso da gravata.', P.green2);
        } else {
          say('Já peguei o crachá. Não vou catar mais coisa no lixo na frente de turista. Tem limite. (Pouco, mas tem.)', P.white);
        }
      }
      else if(curVerb==='usar') say('Eu fico encarando a lata de lixo. A lata de lixo me encara de volta. Empate.', P.white);
      else if(curVerb==='andar'){ walkTo(80); }
      else say('É uma lata de lixo, Flávio.', P.white);
      break;

    case 'arbusto':
      if(curVerb==='olhar'){
        if(game.flags.squirrel) say('Um esquilo gordo destruindo meu cachorro-quente dentro do arbusto. Ele tem mais credencial pra entrar ali do que eu.', P.white);
        else say('Um arbusto ornamental impecável. Farfalha. Deve ter bicho. Tudo aqui tem mais propósito do que eu neste momento.', P.white);
      }
      else if(curVerb==='pegar') say('Eu cutuco o arbusto. Algo cutuca de volta. Eu recuo. Mantenho a dignidade recuando devagar.', P.white);
      else if(curVerb==='usar') say('Pra usar algo no arbusto eu preciso escolher um item primeiro. (Clica no item, depois no arbusto.)', P.ltgray);
      else if(curVerb==='andar'){ walkTo(250); }
      else say('O arbusto não responde. Como todo mundo aqui.', P.white);
      break;
  }
}

// Clicou num item do inventário
function clickInvItem(id){
  if(curVerb==='usar' || curVerb==='dar'){
    usingItem = id;
    say((curVerb==='dar'?'Dar ':'Usar ')+ITEMS[id].name+' com... (clique no alvo)', P.gold);
    clickSnd();
  } else {
    // qualquer outro verbo no item = olhar
    say(ITEMS[id].desc, P.ltgray);
    blip();
  }
}

// Andar do Flávio
function walkTo(x){
  game.flavioTargetX = Math.max(20, Math.min(260, x));
  game.facing = game.flavioTargetX < game.flavioX ? -1 : 1;
  game.walking = true;
}

/* =========================================================================
   SEQUÊNCIA DE VITÓRIA
   ========================================================================= */
let winStep = 0, winTimer = 0;
function winSequence(){
  state = STATE.WIN; winStep = 0; winTimer = 0; game.flags.won = true;
}

/* =========================================================================
   DESENHO DAS CENAS
   ========================================================================= */
function cloud(x,y,w){
  // nuvem chapada com base sombreada — desenhada no ctx atual
  ctx.fillStyle=P.cloudSh;
  ctx.fillRect(x,y+3,w,4); ctx.fillRect(x+w*0.2,y+5,w*0.6,3);
  ctx.fillStyle=P.cloud;
  ctx.fillRect(x+3,y,w-8,4); ctx.fillRect(x,y+2,w,3);
  ctx.fillRect(x+w*0.25,y-2,w*0.45,3);
}

function ditherSky(){
  // gradiente do azul profundo ao horizonte com névoa quente (dithering Bayer)
  ditherGrad(ctx, 0,0, SCREEN_W,40, P.skyTop, P.skyMid);
  ditherGrad(ctx, 0,40, SCREEN_W,30, P.skyMid, P.skyLow);
  ditherGrad(ctx, 0,62, SCREEN_W,14, P.skyLow, P.skyHaze);
  cloud(36,14,30); cloud(150,8,46); cloud(248,20,36); cloud(96,26,22);
}

function drawWhiteHouse(){
  ditherSky();

  // ---- Gramado com luz/sombra e perspectiva ----
  ditherGrad(ctx, 0,70, SCREEN_W,50, P.grassHi, P.grass);
  ditherGrad(ctx, 0,108, SCREEN_W,12, P.grass, P.grassDk);
  // tufos/textura
  ctx.fillStyle=P.grassSh;
  for(let y=78;y<116;y+=5) for(let x=((y*5)%11);x<SCREEN_W;x+=11) ctx.fillRect(x,y,2,1);
  ctx.fillStyle=P.grassHi;
  for(let y=80;y<114;y+=7) for(let x=((y*3)%13)+4;x<SCREEN_W;x+=13) ctx.fillRect(x,y,1,1);

  // ---- Calçada (perspectiva: juntas em leque a partir do centro) ----
  ditherGrad(ctx, 0,120, SCREEN_W,30, P.pathHi, P.path);
  ctx.fillStyle=P.pathSh;
  for(let i=-7;i<=7;i++){
    const top = 160 + i*9;             // juntas próximas no topo
    const bot = 160 + i*26;            // se abrem embaixo (perto do jogador)
    for(let y=0;y<30;y++){ const x = Math.round(top + (bot-top)*(y/30)); ctx.fillRect(x,120+y,1,1); }
  }
  ctx.fillStyle=P.pathDk; ctx.fillRect(0,120,SCREEN_W,1);
  ctx.fillStyle=P.pathHi; ctx.fillRect(0,121,SCREEN_W,1);

  // ---- Casa Branca ----
  const hx=120, hw=170, hy=18;
  // corpo (luz quente em cima, sombra fria embaixo)
  ditherGrad(ctx, hx,hy, hw,30, P.white, P.wwhite);
  ctx.fillStyle=P.whiteHi; ctx.fillRect(hx,hy,hw,3);
  ctx.fillStyle=P.whiteSh; ctx.fillRect(hx,hy+27,hw,3);     // base na sombra
  ctx.fillStyle=P.cool;    ctx.fillRect(hx,hy+30,hw,2);     // sombra projetada no chão
  // colunas com volume (luz à esquerda, sombra à direita)
  for(let i=0;i<8;i++){ const cx=150+i*15;
    ctx.fillStyle=P.whiteSh; ctx.fillRect(cx,24,5,22);
    ctx.fillStyle=P.white;   ctx.fillRect(cx,24,3,22);
    ctx.fillStyle=P.whiteHi; ctx.fillRect(cx,24,1,22);
    ctx.fillStyle=P.shadow;  ctx.fillRect(cx,24,5,1); ctx.fillRect(cx,45,5,1); // capitel/base
  }
  // entablamento + frontão triangular sombreado
  ctx.fillStyle=P.whiteHi; ctx.fillRect(140,14,130,3);
  ctx.fillStyle=P.shadow;  ctx.fillRect(140,17,130,2);
  ctx.fillStyle=P.wwhite; ctx.beginPath();
  ctx.moveTo(165,14); ctx.lineTo(245,14); ctx.lineTo(205,4); ctx.closePath(); ctx.fill();
  ctx.fillStyle=P.whiteHi; ctx.beginPath(); // face iluminada do frontão
  ctx.moveTo(205,4); ctx.lineTo(245,14); ctx.lineTo(225,14); ctx.closePath(); ctx.fill();
  // mastro + bandeira tremulando
  const fl = Math.floor(Date.now()/300)%2;
  ctx.fillStyle=P.gray; ctx.fillRect(204,-2,1,8);
  ctx.fillStyle=P.red;  ctx.fillRect(205,-2,9,2); ctx.fillRect(205+fl,0,9,2); ctx.fillRect(205,2,9,2);
  ctx.fillStyle=P.white2; ctx.fillRect(205,0,9,1);
  ctx.fillStyle=P.blue; ctx.fillRect(205,-2,4,3);
  // janelas com peitoril e brilho
  for(let i=0;i<6;i++){ const wx=128+i*26;
    ctx.fillStyle=P.cool;   ctx.fillRect(wx-1,29,10,12);
    ctx.fillStyle=P.blue;   ctx.fillRect(wx,30,8,10);
    ctx.fillStyle=P.blueLt; ctx.fillRect(wx+1,31,3,4);  // reflexo
    ctx.fillStyle=P.whiteHi;ctx.fillRect(wx-1,40,10,1); // peitoril
  }

  // ---- Cerca de ferro com volume ----
  ctx.fillStyle=P.black;  ctx.fillRect(0,116,SCREEN_W,4);
  ctx.fillStyle=P.dkgray; ctx.fillRect(0,116,SCREEN_W,1);
  for(let x=4;x<SCREEN_W;x+=10){
    ctx.fillStyle=P.black;  ctx.fillRect(x,96,2,24);

}

/* =========================================================================
   UI: barra de verbos + inventário + linha de comando
   ========================================================================= */
function buildSentence(hoverHot){
  let s = VERBS.find(v=>v.id===curVerb).label;
  if(usingItem){
    s = (curVerb==='dar'?'Dar ':'Usar ') + ITEMS[usingItem].name + (curVerb==='dar'?' para':' com');
  }
  if(hoverHot){ s += ' ' + hoverHot; }
  return s;
}

let hoverName = '';
function drawUI(){
  const top=150, PH=SCREEN_H-top;
  // painel de controle com bisel (estilo "console" de adventure)
  ctx.fillStyle=P.uiBg2; ctx.fillRect(0,top,SCREEN_W,PH);
  ctx.fillStyle=P.uiBg;  ctx.fillRect(0,top+2,SCREEN_W,PH-2);
  ctx.fillStyle=P.uiLine;ctx.fillRect(0,top,SCREEN_W,1);
  ctx.fillStyle=P.uiHi;  ctx.fillRect(0,top+1,SCREEN_W,1);

  // linha de comando (auto-ajusta a fonte p/ caber, e fica grande no celular)
  const sentence = buildSentence(hoverName);
  const slh = PH>70 ? 15 : 9;
  let ss = (PH>70 ? 1.6 : 1);
  ss = Math.min(ss, (SCREEN_W-10)/Math.max(1, txtW(sentence,1)));
  ctx.fillStyle=P.black; ctx.fillRect(3,top+2,SCREEN_W-6,slh-2);
  txtCenterSh(sentence, top+2+Math.floor((slh-2-6*ss)/2), usingItem?P.gold:P.green2, ss);

  // área de controles
  const ay = top+slh+1;
  const ah = SCREEN_H-ay-3;

  // verbos: 2 colunas x 3 linhas (metade esquerda) — alvos grandes no toque
  const gx=3, gw=152, gap=2;
  const bw=Math.floor((gw-gap)/2), bh=Math.floor((ah-gap*2)/3);
  const vs = Math.min(bh>=18?1.4:1, (bw-6)/Math.max(1, txtW('Falar com',1)));
  for(let i=0;i<VERBS.length;i++){
    const c=i%2, r=(i/2)|0;
    const bx=gx+c*(bw+gap), by=ay+r*(bh+gap);
    const sel=curVerb===VERBS[i].id;
    ctx.fillStyle=sel?P.uiSel:P.uiHi; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=sel?P.gold:P.uiLine; ctx.fillRect(bx,by,bw,1);        // bisel claro
    ctx.fillStyle=P.black; ctx.fillRect(bx,by+bh-1,bw,1); ctx.fillRect(bx+bw-1,by,1,bh);
    txtSh(VERBS[i].label, bx+4, by+Math.floor((bh-6*vs)/2), sel?P.white2:P.ltgray, vs);
    VERBS[i]._box=[bx,by,bw,bh];
  }

  // inventário 3x2 (metade direita)
  const ix=gx+gw+4, iw=SCREEN_W-ix-3, ig=2;
  const sw=Math.floor((iw-ig*2)/3), sh=Math.floor((ah-ig)/2);
  ctx.fillStyle=P.uiBg2; ctx.fillRect(ix-2,ay-1,iw+4,ah+2);
  for(let s=0;s<6;s++){

    ctx.fillStyle=P.black; ctx.fillRect(sx,sy,sw,sh);
    ctx.fillStyle=P.uiHi;  ctx.fillRect(sx,sy,sw,1); ctx.fillRect(sx,sy,1,sh);

  }
}

function render(){
  ctx.fillStyle=P.black; ctx.fillRect(0,0,SCREEN_W,SCREEN_H);
  switch(state){
    case STATE.BOOT: drawBoot(); break;
    case STATE.TITLE: drawTitle(); break;
    case STATE.COPYPROT: drawCopyProt(); break;
    case STATE.INTRO: drawIntro(); break;
    case STATE.GAME: drawGame(); break;
    case STATE.WIN: drawWin(); break;
  }
  // escala pro canvas visível (nearest neighbor)
  vctx.imageSmoothingEnabled=false;
  vctx.clearRect(0,0,view.width,view.height);
  vctx.drawImage(buf,0,0,view.width,view.height);
}

/* =========================================================================
   LOOP
   ========================================================================= */
function loop(){
  titleBlink++; bootTimer++;
  if(state===STATE.BOOT && bootTimer>150){ state=STATE.TITLE; }

  // andar do Flávio
  if(game.walking){
    game.bob += 0.4;
    const dx = game.flavioTargetX - game.flavioX;
    if(Math.abs(dx) < 2){ game.flavioX = game.flavioTargetX; game.walking=false; }
    else { game.flavioX += Math.sign(dx)*1.6; }
  }

  // sequência de vitória avança no tempo
  if(state===STATE.WIN){
    winTimer++;
    if(winStep===0 && winTimer>70){ winStep=1; winTimer=0; camera(); }
    else if(winStep===1 && winTimer>90){ winStep=2; winTimer=0; }
    else if(winStep===2 && winTimer>110){ winStep=3; winTimer=0; triumph(); }
  }

  render();
  requestAnimationFrame(loop);
}

/* =========================================================================
   INPUT
   ========================================================================= */
function screenToBuf(ev){
  const r = view.getBoundingClientRect();
  const t = ev.touches ? ev.touches[0] : ev;
  const x = (t.clientX - r.left) / r.width * SCREEN_W;
  const y = (t.clientY - r.top)  / r.height * SCREEN_H;
  return {x,y};
}

function pointInHot(x,y,h){ return x>=h.x && x<=h.x+h.w && y>=h.y && y<=h.y+h.h; }

function handleClick(x,y){
  initAudio();
  clickSnd();
  const h=document.getElementById('hint'); if(h) h.style.display='none';

  if(state===STATE.TITLE){ state=STATE.COPYPROT; cpInput=''; return; }
  if(state===STATE.COPYPROT){ state=STATE.INTRO; return; }
  if(state===STATE.INTRO){ state=STATE.GAME; say('Cheguei. A Casa Branca. Respira, Flávio. Aja natural. (Olhe e fale com as coisas. Para usar/dar um item, clique nele no inventário e depois no alvo.)', P.green2); return; }
  if(state===STATE.WIN){
    if(winStep>=3){ resetGame(); state=STATE.TITLE; }
    else { winStep=Math.min(3,winStep+1); winTimer=0; if(winStep===3) triumph(); }
    return;
  }
  if(state!==STATE.GAME) return;

  // fala aberta -> fecha
  if(speech){ clearSpeech(); return; }

  // clique na UI?
  if(y>=150){
    // verbos
    for(const v of VERBS){
      if(v._box){ const[bx,by,bw,bh]=v._box;
        if(x>=bx&&x<=bx+bw&&y>=by&&y<=by+bh){ curVerb=v.id; if(v.id!=='usar'&&v.id!=='dar') usingItem=null; blip(); return; } }
    }
    // inventário
    if(game._invBoxes){
      for(const k in game._invBoxes){
        const[sx,sy,sw,sh,item]=game._invBoxes[k];
        if(x>=sx&&x<=sx+sw&&y>=sy&&y<=sy+sh){ clickInvItem(item); return; }
      }
    }
    return;
  }

  // clique na cena -> hotspot?
  for(const h of HOTSPOTS){
    if(pointInHot(x,y,h)){
      if(h.walkX!==undefined && curVerb!=='andar') walkTo(h.walkX);
      interact(h.id);
      return;
    }
  }
  // clique no chão -> andar
  if(y>70){ walkTo(x); }
  else { if(usingItem){ usingItem=null; curVerb='olhar'; } }
}

function updateHover(x,y){
  hoverName='';
  if(state!==STATE.GAME || y>=150) return;
  for(const h of HOTSPOTS){ if(pointInHot(x,y,h)){ hoverName=h.name; break; } }
}

view.addEventListener('mousedown', e=>{ const p=screenToBuf(e); handleClick(p.x,p.y); });
view.addEventListener('mousemove', e=>{ const p=screenToBuf(e); updateHover(p.x,p.y); });
view.addEventListener('touchstart', e=>{ e.preventDefault(); const p=screenToBuf(e); updateHover(p.x,p.y); handleClick(p.x,p.y); }, {passive:false});

window.addEventListener('keydown', e=>{
  if(state===STATE.COPYPROT){
    if(e.key==='Enter'||e.key==='Escape'){ state=STATE.INTRO; }
    else if(e.key==='Backspace'){ cpInput=cpInput.slice(0,-1); }
    else if(e.key.length===1 && cpInput.length<18){ cpInput+=e.key; blip(); }
    e.preventDefault();
  }
});

function resetGame(){
  game.inv=['celular'];
  for(const k in game.flags) game.flags[k]=false;
  game.flavioX=60; game.flavioTargetX=60; game.walking=false;
  game._invBoxes={}; usingItem=null; curVerb='olhar'; speech=null;
  winStep=0; winTimer=0;
}

/* =========================================================================
   ESCALA RESPONSIVA: preenche a tela (fracionário). Em RETRATO o buffer
   fica mais alto (260) p/ um painel de controle grande, com botões e
   diálogos legíveis no celular. Em paisagem volta ao clássico 320x200.
   ========================================================================= */
function resize(){
  const pad = 4;
  const maxW = Math.max(160, window.innerWidth - pad);
  const maxH = Math.max(120, window.innerHeight - pad);
  portrait = (maxH / maxW) > 1.15;
  const wantH = portrait ? 260 : 200;
  dlgScale = portrait ? 1.4 : 1;
  if(buf.height !== wantH){
    SCREEN_H = wantH;
    buf.height = SCREEN_H; view.width = SCREEN_W; view.height = SCREEN_H;
    ctx.imageSmoothingEnabled = false; ctx.textBaseline = 'top';
    vctx.imageSmoothingEnabled = false;
  }
  const scale = Math.min(maxW/SCREEN_W, maxH/SCREEN_H);
  view.style.width  = Math.round(SCREEN_W*scale)+'px';
  view.style.height = Math.round(SCREEN_H*scale)+'px';
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);
resize();
loop();
</script>
